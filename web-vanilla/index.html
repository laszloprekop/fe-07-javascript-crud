<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roger's Retro Cars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body class="container">
<h1>My Cars</h1>
<form id="car-form">
    <input type="hidden" id="car-id">
    <div class="grid">
        <input type="text" id="brand" placeholder="Brand" required>
        <input type="text" id="model" placeholder="Model" required>
    </div>
    <div class="grid">
        <input type="number" id="year" placeholder="Year" required>
        <input type="text" id="color" placeholder="Color" required>
        <button type="submit" id="submit-btn">Save Car</button>
    </div>
</form>

<hr>
<div id="car-list"></div>

<script>
  const API_URL = 'http://localhost:5014/api/cars';
  const carList = document.getElementById('car-list');


  const fetchCars = async () => {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error(`Fetch failed: ${response.status} ${response.statusText}`);
    const cars = await response.json();
    renderCars(cars);
  }

  const deleteCar = async (id) => {
    const response = await fetch(`${API_URL}/${id}`, {
      method: 'DELETE',
    });
    if (response.ok) {
      await fetchCars();
    } else {
      alert('Failed to delete car');
    }
  }


  const renderCars = (cars) => {
    carList.innerHTML = "";
    cars.forEach(car => {
      const card = document.createElement('div');
      card.classList.add('grid', 'gap-y-1');
      card.innerHTML = `<strong>${car.brand}, ${car.model}</strong><span>(${car.year})</span> <span>${car.color}</span>
        <button onclick='prepareEdit(${JSON.stringify(car)})'>Edit</button>
        <button onclick="deleteCar(${car.id})">Delete</button>`;
      carList.appendChild(card);
    });
  };

  let currentEditingId = null;

  const prepareEdit = (car) => {
    currentEditingId = car.id;
    document.getElementById('brand').value = car.brand;
    document.getElementById('model').value = car.model;
    document.getElementById('year').value = car.year;
    document.getElementById('color').value = car.color;
    document.getElementById('submit-btn').textContent = "Update Car";
  }

  fetchCars();

  // Create handler
  const carForm = document.getElementById('car-form');

  carForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    const newCar = {
      brand: document.getElementById('brand').value,
      model: document.getElementById('model').value,
      year: document.getElementById('year').value,
      color: document.getElementById('color').value
    }

    let response;
    if (currentEditingId === null) {
      response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(newCar)
      });
    } else {
      response = await fetch(`${API_URL}/${currentEditingId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({...newCar, id: currentEditingId})
      })
    }

    if (response.ok) {
      carForm.reset();
      document.getElementById('submit-btn').textContent = "Save Car";
      currentEditingId = null;

      await fetchCars();
    } else {
      alert('Failed to save car');
    }
  })
</script>
</body>
</html>
