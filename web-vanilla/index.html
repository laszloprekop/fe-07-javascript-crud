<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roger's Retro Cars</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body class="container">
<h1>My Cars</h1>
<form id="car-form">
    <input type="hidden" id="car-id">
    <div class="grid">
        <input type="text" id="brand" placeholder="Brand" required>
        <input type="text" id="model" placeholder="Model" required>
    </div>
    <div class="grid">
        <input type="number" id="year" placeholder="Year" required>
        <input type="text" id="color" placeholder="Color" required>
        <button type="submit" id="submit-btn">Save Car</button>
    </div>
</form>

<hr>
<div id="car-list"></div>

<script>
  const API_URL = 'http://localhost:5014/api/cars';
  const carList = document.getElementById('car-list');


  const fetchCars = async () => {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error(`Fetch failed: ${response.status} ${response.statusText}`);
    const cars = await response.json();
    renderCars(cars);
  }
  const renderCars = (cars) => {
    carList.innerHTML = "";
    cars.forEach(car => {
      const card = document.createElement('div');
      card.classList.add('car-card');
      card.innerHTML = `<strong>${car.brand} ${car.model}</strong> (${car.year}) • ${car.color}`;
      carList.appendChild(card);
    });
  };

  fetchCars();
</script>
</body>
</html>
